id: provider.gemini-cli
name: Gemini CLI
kind: cloud_cli_agent
transport: cli
adapter: code_agent
command:
  executable: gemini
  args_template:
    - "{{rendered_input}}"
capabilities:
  edit_files: true
  run_shell: true
  read_repo: true
  apply_patch: partial
  structured_output: partial
  offline: false
  requires_login_session: true
risk:
  can_modify_workspace: true
  can_run_commands: true
  requires_sandbox: true
outputs:
  parser: gemini-cli-default
