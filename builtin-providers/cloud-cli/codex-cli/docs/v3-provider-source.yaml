provider: codex
capabilities:
  exec: true
  resume: true
  fork: true
  json_events: true
  output_last_message: true
  output_schema: true
roles:
  router-low:
    command: codex
    args:
      - exec
      - --profile
      - low-router
      - --json
      - --output-last-message
      - "{run_dir}/router/output.md"
  worker-impl:
    command: codex
    args:
      - exec
      - --profile
      - worker-impl
      - --json
      - --output-last-message
      - "{run_dir}/implement/output.md"
  worker-review:
    command: codex
    args:
      - exec
      - --profile
      - worker-review
      - --json
      - --output-last-message
      - "{run_dir}/review/output.md"
