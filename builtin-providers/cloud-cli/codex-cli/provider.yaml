id: provider.codex-cli
name: Codex CLI
kind: cloud_cli_agent
transport: cli
adapter: code_agent
command:
  executable: codex
  args_template:
    - "{{rendered_input}}"
capabilities:
  edit_files: true
  run_shell: true
  read_repo: true
  apply_patch: true
  structured_output: partial
  offline: false
  requires_login_session: true
risk:
  can_modify_workspace: true
  can_run_commands: true
  requires_sandbox: true
outputs:
  parser: codex-cli-default
