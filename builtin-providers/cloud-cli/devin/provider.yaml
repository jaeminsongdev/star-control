id: provider.devin
name: Devin
kind: cloud_cli_agent
transport: manual
adapter: code_agent
handoff:
  mode: manual
  expected_report: normalized-provider-result.json
capabilities:
  edit_files: manual
  run_shell: manual
  read_repo: true
  apply_patch: manual
  structured_output: manual
  offline: false
  requires_login_session: true
  native_autonomous_software_engineer: true
  native_cloud_workspace: true
  native_saved_machine_state: true
  native_long_running_sessions: true
  native_team_workflow: true
risk:
  can_modify_workspace: false
  can_run_commands: false
  requires_sandbox: false
outputs:
  parser: devin-report
