id: provider.cursor
name: Cursor
kind: cloud_cli_agent
transport: cli
adapter: code_agent
command:
  executable: cursor
  args_template:
    - "{{rendered_input}}"
capabilities:
  edit_files: true
  run_shell: partial
  read_repo: true
  apply_patch: partial
  structured_output: partial
  offline: false
  requires_login_session: true
  native_agent_mode: true
  native_plan_mode: true
  native_background_agents: true
  native_rules: true
  native_memories: true
  native_mcp: true
  native_semantic_search: true
risk:
  can_modify_workspace: true
  can_run_commands: false
  requires_sandbox: true
outputs:
  parser: cursor-default
