id: my-openai-api
provider: provider.openai
enabled: true
limits:
  timeout_seconds: 300
  max_parallel_jobs: 1
routing_tags:
  - cloud
  - api
credential_ref: env:OPENAI_API_KEY
transport_config:
  privacy_handoff_approved: false
endpoint:
  base_url: "https://api.openai.com/v1"
  model: gpt-example
