id: my-google-gemini-api
provider: provider.google-gemini
enabled: true
limits:
  timeout_seconds: 300
  max_parallel_jobs: 1
routing_tags:
  - cloud
  - api
credential_ref: env:GOOGLE_GEMINI_API_KEY
transport_config:
  privacy_handoff_approved: false
endpoint:
  base_url: "https://generativelanguage.googleapis.com"
  model: gemini-example
