id: my-local-process
provider: provider.local-process
enabled: true
limits:
  timeout_seconds: 300
  max_parallel_jobs: 1
routing_tags:
  - local
  - process
command_policy:
  shell: false
  allowed_executables:
    - runner
  env_allowlist: []
  cwd_policy: project_root
  network: deny
  workspace_write: deny
command:
  executable: runner
  model_path: model.gguf
