id: my-anthropic-api
provider: provider.anthropic
enabled: true
limits:
  timeout_seconds: 300
  max_parallel_jobs: 1
routing_tags:
  - cloud
  - api
credential_ref: env:ANTHROPIC_API_KEY
transport_config:
  privacy_handoff_approved: false
endpoint:
  base_url: "https://api.anthropic.com"
  model: claude-example
