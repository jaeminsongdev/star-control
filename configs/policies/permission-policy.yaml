version: 1
modes:
  read-only:
    edit_files: false
    run_shell: false
  draft-only:
    edit_files: false
    run_shell: false
    allowed_outputs: ["draft.md", "notes.md", "report.json"]
  workspace-write:
    edit_files: true
    run_shell: true
    require_command_policy: true
  approval-required:
    edit_files: false
    run_shell: false
    requires_user_approval: true
  blocked:
    edit_files: false
    run_shell: false
    blocked: true
