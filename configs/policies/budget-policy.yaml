version: 1
defaults:
  max_iterations: 5
  max_worker_minutes: 30
  max_parallel_workers: 2
  require_user_approval_above_cost: true
routing_cost_policy:
  local_first_for:
    - summarization
    - draft
    - log_analysis
  high_cloud_required_for:
    - security
    - public_api
    - db_schema
    - concurrency
