version: 1
forbidden:
  - id: git_reset_hard
    pattern: ["git", "reset", "--hard"]
    reason: 미커밋 변경 삭제 위험
  - id: git_clean
    pattern: ["git", "clean"]
    reason: 추적되지 않는 파일 삭제 위험
  - id: rm_rf
    pattern: ["rm", "-rf"]
    reason: 대량 삭제 위험
  - id: git_force_push
    pattern: ["git", "push", "--force"]
    reason: 원격 히스토리 파괴 위험
prompt:
  - id: git_push
    pattern: ["git", "push"]
    reason: 원격 저장소 영향
  - id: git_commit
    pattern: ["git", "commit"]
    reason: 히스토리 변경
  - id: dependency_install_npm
    pattern: ["npm", "install"]
    reason: 의존성/lockfile 변경
  - id: dependency_install_pip
    pattern: ["pip", "install"]
    reason: Python 환경 변경
  - id: cargo_add
    pattern: ["cargo", "add"]
    reason: Rust 의존성 변경
  - id: docker
    pattern: ["docker"]
    reason: 컨테이너/볼륨/네트워크 영향 가능
