name: Star-Control CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy-check:
    name: repository-policy-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CI dependencies
        run: python -m pip install --upgrade PyYAML
      - name: Run repository policy check
        run: python scripts/ci/check_repo_policy.py

  data-format-check:
    name: data-format-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CI dependencies
        run: python -m pip install --upgrade PyYAML
      - name: Run data format check
        run: python scripts/ci/check_data_formats.py

  manifest-contract-check:
    name: manifest-contract-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CI dependencies
        run: python -m pip install --upgrade PyYAML
      - name: Run manifest contract check
        run: python scripts/ci/check_manifest_contracts.py

  naming-policy-check:
    name: naming-policy-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run naming policy check
        run: python scripts/ci/check_star_sentinel_naming.py

  forbidden-files-check:
    name: forbidden-files-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run forbidden files check
        run: python scripts/ci/check_forbidden_files.py
