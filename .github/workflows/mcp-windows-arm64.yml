name: MCP Windows ARM64 verification

on:
  workflow_dispatch:
    inputs:
      smoke_only:
        description: Reuse prior full-run evidence and execute release build plus native smoke only
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  mcp-windows-arm64:
    runs-on: windows-11-arm
    timeout-minutes: 120
    steps:
      - name: Checkout isolated verification snapshot
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install validation Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: scripts/validation/requirements-validation.txt

      - name: Install validation dependencies
        run: "python -m pip install --only-binary=:all: --require-hashes -r scripts/validation/requirements-validation.txt"

      - name: Resolve repository Rust toolchain
        shell: pwsh
        run: |
          cargo --version
          rustc -vV
          if ((rustc -vV | Select-String '^host: aarch64-pc-windows-msvc$').Count -ne 1) {
            throw 'runner Rust host is not native aarch64-pc-windows-msvc'
          }

      - name: Native ARM64 FULL validation
        if: ${{ !inputs.smoke_only }}
        shell: pwsh
        run: pwsh ./scripts/validate.ps1 -Profile full -OutputFormat json

      - name: Native ARM64 release build
        shell: pwsh
        run: cargo build --workspace --release --locked

      - name: Native ARM64 Gateway IPC Registry process smoke
        shell: pwsh
        run: |
          ./tools/mcp-arm64-smoke.ps1 `
            -RunRoot "$env:RUNNER_TEMP/star-control-mcp-arm64" `
            -EvidencePath "target/arm64-ci-evidence/mcp-arm64-native-smoke-v1.json" `
            -PrestartController `
            2>&1 | Tee-Object target/arm64-ci-evidence/mcp-arm64-smoke.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload native ARM64 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcp-windows-arm64-evidence
          path: |
            target/arm64-ci-evidence
            target/validation
          if-no-files-found: error
