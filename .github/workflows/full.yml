name: Star-Control full

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: star-control-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    name: Windows full gate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --workspace --all-targets --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Check generated schemas
        run: cargo run --locked -p star-schema-gen -- --check

      - name: Check 170-item MCP matrix
        run: cargo run --locked -p star-matrix-check

      - name: Check patch whitespace
        shell: pwsh
        run: git diff --check
