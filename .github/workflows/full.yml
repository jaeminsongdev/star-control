name: Star-Control validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: Validation profile
        type: choice
        required: true
        default: full
        options:
          - full
          - release

permissions:
  contents: read

concurrency:
  group: star-control-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Native validation
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VALIDATION_PROFILE: ${{ github.event_name == 'pull_request' && 'target' || (github.event_name == 'push' && 'full' || inputs.profile) }}
      VALIDATION_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install validation Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: scripts/validation/requirements-validation.txt

      - name: Install validation dependencies
        run: "python -m pip install --only-binary=:all: --require-hashes -r scripts/validation/requirements-validation.txt"

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy, rust-analyzer

      - name: Run native validation
        shell: pwsh
        run: |
          $parameters = @{
            Profile = $env:VALIDATION_PROFILE
            OutputFormat = "text"
          }
          if ($env:VALIDATION_BASE_REF -and $env:VALIDATION_BASE_REF -notmatch "^0+$") {
            $parameters.BaseRef = $env:VALIDATION_BASE_REF
          }
          ./scripts/validate.ps1 @parameters
