schema_version = 1
profile_id = "docs_config_environment"
profile_version = "1.0.0"
display_name = "Docs Config Environment"
summary = "문서 명령·링크, 설정 trace, doctor와 clean-room 재현을 검증한다."
parent_profile = { profile_id = "ai_development_validation", profile_version = "1.0.0" }
triggers = ["config_change", "developer_environment_change", "documentation_change"]
stage_template = ["documentation_snapshot", "config_trace", "doctor", "clean_room", "goal_gate"]
context_rules = ["documented_command", "effective_config", "redacted_environment"]
route_hints = ["documentation", "environment"]
permission_actions = []
gate_phases = ["during_stage", "stage_exit", "goal_exit"]
required_rule_families = ["config_contract", "documentation", "environment_reproducibility"]
required_check_families = ["docs", "environment"]
optional_check_families = ["clean_room"]
always_run_for = ["public_command_change"]
baseline_policy = "ratchet_new"
suppression_policy = "bounded_expiring"
claim_policy = ["configuration", "documentation", "environment"]
stability_policy = "human_review_flaky"
evidence_requirements = ["config_trace", "doctor_report", "documentation_snapshot"]
corpus_requirements = ["clean_room"]
approval_checkpoints = []
default_stop_state = "documentation_gate_decided"
allowed_effect_classes = ["read", "plan", "validate"]
permission_floor = "local_read_only"

[review_policy]
cli_only = "human_semantic"
codex_managed = "independent_human"
