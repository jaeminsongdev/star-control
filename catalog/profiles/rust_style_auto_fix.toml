schema_version = 1
profile_id = "rust_style_auto_fix"
profile_version = "1.0.0"
display_name = "Rust Style Auto Fix"
summary = "pinned stable rustfmt와 allowlisted Clippy를 isolated preview와 exact PatchSet으로 적용한다."
parent_profile = { profile_id = "refactor_codemod", profile_version = "1.0.0" }
triggers = ["rust_style_deviation", "rust_style_request"]
stage_template = ["resolve", "inspect", "isolated_preview", "candidate_validation", "pre_gate", "exact_apply", "post_gate"]
context_rules = ["complete_coverage", "current_index", "pinned_toolchain", "style_config_resolved"]
route_hints = ["rust_style_v1", "safe_patch"]
permission_actions = ["patch.apply", "rust_style.personal_auto"]
gate_phases = ["patch_pre_apply", "patch_post_apply", "goal_exit"]
required_rule_families = ["architecture", "hardcoding", "rust_style", "security", "side_effect"]
required_check_families = ["architecture", "build", "format", "hardcoding", "lint", "security", "test"]
optional_check_families = []
always_run_for = ["personal_auto", "rust_style_patch"]
baseline_policy = "clean_only"
suppression_policy = "approved_expiring"
claim_policy = ["formatting", "patch", "style"]
stability_policy = "block_required_flaky"
evidence_requirements = ["coverage_matrix", "evidence_bundle", "patch_set", "policy_snapshot", "toolchain_binding"]
corpus_requirements = ["conflict", "coverage", "idempotence", "side_effect", "target", "toolchain"]
approval_checkpoints = ["patch_apply"]
default_stop_state = "prepared"
allowed_effect_classes = ["read", "plan", "validate", "workspace_mutation"]
permission_floor = "exact_durable_approval"

[review_policy]
cli_only = "none"
codex_managed = "independent_human"

[extensions.rust_style]
profile_kind = "rust_style_auto_fix"
pipeline_ref = "rust_style_v1@1"
toolchain_release = "1.96.0"
default_policy = "safe_default"
supported_policies = ["safe_default", "personal_auto"]
tool_role_refs = ["cargo_check@1", "cargo_clippy@1", "cargo_fmt@1", "cargo_test_no_run@1"]
source_effect = "isolated_preview_then_exact_patch"
network = "denied"
steps = ["resolve", "current_check", "scope", "isolated_preview", "rustfmt_first", "clippy_allowlisted_fix", "rustfmt_final", "side_effect_validation", "idempotence_replay", "candidate_validation", "immutable_patch_set", "exact_approval", "pre_gate", "single_use_permit", "patch_apply", "post_gate"]
required_gates = ["patch_pre_apply", "patch_post_apply"]
allowed_live_operations = ["modify_handwritten_in_scope_rs"]
built_in_clippy_fix_allowlist = []
