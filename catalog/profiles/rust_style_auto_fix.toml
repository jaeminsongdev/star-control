  "current_check",
  "scope",
  "isolated_preview",
  "rustfmt_first",
  "clippy_allowlisted_fix",
  "rustfmt_final",
  "side_effect_validation",
  "idempotence_replay",
  "candidate_validation",
  "immutable_patch_set",
  "exact_approval",
  "pre_gate",
  "single_use_permit",
  "patch_apply",
  "post_gate",
]
required_gates = ["patch_pre_apply", "patch_post_apply"]
