version: 1
name: star-sentinel-p0-policy
description: >
  Star Sentinel P0 검증 기준을 구현 전부터 고정하기 위한 기본 정책이다.
  이 파일은 실행 코드가 아니라 policy contract와 fixture의 기준점이다.

profiles:
  quick:
    required_rules:
      - task.scope.allowed_paths
      - test.no_deletion
      - test.no_skip_only_ignore
      - dependency.requires_approval
      - secret.no_plaintext_secret
  near:
    extends:
      - quick
    required_rules:
      - claim.validation_evidence_required
      - report.changed_files_match_diff
  validator:
    required_rules:
      - validator.no_self_bypass
      - validator.policy_change_requires_approval

severities:
  block:
    exits_gate: true
    requires_human_review: true
  warn:
    exits_gate: false
    requires_human_review: false
  info:
    exits_gate: false
    requires_human_review: false

approval_required_change_types:
  - public_api_change
  - schema_change
  - dependency_addition
  - dependency_version_change
  - validator_config_change
  - risk_path_change
  - file_deletion

forbidden_auto_change_types:
  - test_deletion
  - assertion_weakening
  - skip_only_ignore_addition
  - validator_bypass
  - secret_exposure

gate_decisions:
  auto_pass:
    allowed_when_block_count: 0
    allowed_when_unverified_claims: 0
  human_review:
    allowed_when_block_count: 0
    allowed_when_unverified_claims_greater_than: 0
  block:
    required_when_block_count_greater_than: 0
